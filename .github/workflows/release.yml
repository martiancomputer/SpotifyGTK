name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build release tarball (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        profile: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            meson ninja-build pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libsoup-3.0-dev libjson-glib-dev \
            libsecret-1-dev libglib2.0-dev \
            libogg-dev libvorbis-dev \
            libssl-dev libjpeg-turbo8-dev \
            libpulse-dev libasound2-dev \
            libva-dev libva-drm2 libpipewire-0.3-dev

      - name: Configure & dist
        run: |
          meson setup build --native-file build-profiles/${{ matrix.profile }}.ini
          ninja -C build dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/meson-dist/*.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
