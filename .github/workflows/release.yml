name: Release

# Builds a release tarball for spotify-connect only -- spotify-native
# isn't a shippable client yet (no UI, no playback, login only just
# started working against a real server), so there's nothing
# meaningful to release from it until that changes.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build release tarball (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        profile: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            meson ninja-build pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libsoup-3.0-dev libjson-glib-dev \
            libsecret-1-dev libglib2.0-dev \
            libjpeg-turbo8-dev \
            libva-dev libva-drm2

      - name: Configure & dist
        working-directory: apps/spotify-connect
        run: |
          meson setup build --native-file build-profiles/${{ matrix.profile }}.ini
          ninja -C build dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/spotify-connect/build/meson-dist/*.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
