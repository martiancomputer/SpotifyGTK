name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (${{ matrix.profile }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: stable
            os: ubuntu-22.04
          - profile: stable
            os: ubuntu-24.04
          - profile: nightly
            os: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            meson ninja-build pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libsoup-3.0-dev libjson-glib-dev \
            libsecret-1-dev libglib2.0-dev \
            libogg-dev libvorbis-dev \
            libssl-dev libjpeg-turbo8-dev \
            libpulse-dev libasound2-dev

      - name: Install nightly-only dependencies
        if: matrix.profile == 'nightly'
        run: |
          sudo apt-get install -y libva-dev libva-drm2 libpipewire-0.3-dev

      - name: Configure (Meson)
        run: |
          meson setup build \
            --native-file build-profiles/${{ matrix.profile }}.ini \
            -Dtests=true

      - name: Build
        run: ninja -C build

      - name: Run tests
        run: meson test -C build --print-errorlogs

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs-${{ matrix.profile }}-${{ matrix.os }}
          path: build/meson-logs/

  lint:
    name: Lint (cppcheck)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -i src/vendor \
            src/
