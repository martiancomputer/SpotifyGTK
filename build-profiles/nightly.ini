# Nightly track — bleeding-edge GTK, hardware acceleration, best performance.
# Targets: Arch, Fedora (latest), Ubuntu 24.04+, anything with GTK 4.14+.
#
# Usage:
#   meson setup build-nightly --native-file build-profiles/nightly.ini --buildtype=release

[built-in options]
buildtype = 'release'

[project options]
profile         = 'nightly'
enable_vaapi    = true
enable_pipewire = true
enable_dmabuf   = true
audio_backend   = 'pipewire'
