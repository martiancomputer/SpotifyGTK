# Nightly track -- bleeding-edge GTK, hardware-accelerated image decode.
# Targets: Arch, Fedora (latest), Ubuntu 24.04+, anything with GTK 4.14+.
#
# Usage:
#   meson setup build --native-file build-profiles/nightly.ini --buildtype=release

[built-in options]
buildtype = 'release'

[project options]
profile       = 'nightly'
enable_vaapi  = true
enable_dmabuf = true
