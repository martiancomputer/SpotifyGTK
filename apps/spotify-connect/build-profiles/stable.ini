# Stable track -- broad compatibility, zero debugging required.
# Targets: Ubuntu 22.04 LTS, Ubuntu 24.04, RHEL 9, Debian 12.
#
# Usage:
#   meson setup build --native-file build-profiles/stable.ini --buildtype=release

[built-in options]
buildtype = 'release'

[project options]
profile       = 'stable'
enable_vaapi  = false
enable_dmabuf = false
